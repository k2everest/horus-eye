syntax = "proto3";

package aegis.v1;

option go_package = "github.com/horus-eye/aegis-flow/gen/go/aegis/v1;aegisv1";

service TxService {
  rpc ValidateShieldedTx(ValidateShieldedTxRequest) returns (ValidateShieldedTxResponse);
}

message ValidateShieldedTxRequest {
  bytes tx_blob = 1;
  string request_id = 2;
}

message ValidateShieldedTxResponse {
  bool valid = 1;
  repeated string failed_checks = 2;
  string request_id = 3;
}
